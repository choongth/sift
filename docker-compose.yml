services:

  mcp:
    build: .
    command: ["uvicorn", "server.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped

  chainlit:
    build: .
    command: ["chainlit", "run", "chainlit_app.py", "--port", "8082", "--host", "0.0.0.0"]
    ports:
      - "8082:8082"
    env_file: .env
    environment:
      # Override localhost URL from .env — use the Docker service name instead
      MCP_SERVER_URL: http://mcp:8000/sse
    volumes:
      - ./reports:/app/reports
    depends_on:
      - mcp
    restart: unless-stopped
